<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Company Footer</title>

  <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, sans-serif;
    }

    footer{
      background:#222;
      color:white;
      padding:40px 20px;
    }

    .link-boxes{
      display:flex;
      justify-content:space-between;
      flex-wrap:wrap;
      gap:20px;
    }

    .box{
      min-width:180px;
    }

    .box h2{
      margin-bottom:15px;
      font-size:20px;
      color:#f4b400;
    }

    .box ul{
      list-style:none;
    }

    .box ul li{
      margin-bottom:10px;
    }

    .box ul li a{
      text-decoration:none;
      color:#ddd;
    }

    .box ul li a:hover{
      color:white;
    }

    .media-icons{
      display:flex;
      gap:12px;
      margin-top:15px;
    }

    .media-icons a{
      width:40px;
      height:40px;
      background:#444;
      border-radius:50%;
      display:flex;
      justify-content:center;
      align-items:center;
      color:white;
      text-decoration:none;
    }

    .media-icons a:hover{
      background:#f4b400;
      color:#222;
    }

    @media(max-width:768px){
      .link-boxes{
        flex-direction:column;
      }
    }
  </style>
</head>
<body>

  <footer>
    <div class="link-boxes">

      <div class="box">
        <h2>Home</h2>
        <ul>
          <li><a href="#">Homepage</a></li>
          <li><a href="#">Updates</a></li>
        </ul>
      </div>

      <div class="box">
        <h2>About</h2>
        <ul>
          <li><a href="#">Company</a></li>
          <li><a href="#">Team</a></li>
        </ul>
      </div>

      <div class="box">
        <h2>Links</h2>
        <ul>
          <li><a href="#">Blog</a></li>
          <li><a href="#">Portfolio</a></li>
        </ul>
      </div>

      <div class="box">
        <h2>Services</h2>
        <ul>
          <li><a href="#">Web Design</a></li>
          <li><a href="#">Development</a></li>
        </ul>
      </div>

      <div class="box">
        <h2>Contact</h2>
        <ul>
          <li>8879887262</li>
          <li><a href="#">Social Media</a></li>
        </ul>

        <div class="media-icons">
          <a href="#"><i class="fab fa-facebook-f"></i></a>
          <a href="#"><i class="fab fa-twitter"></i></a>
          <a href="#"><i class="fab fa-instagram"></i></a>
          <a href="#"><i class="fab fa-linkedin-in"></i></a>
          <a href="#"><i class="fab fa-youtube"></i></a>
        </div>
      </div>

    </div>
  </footer>

</body>
</html>
